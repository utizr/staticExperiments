<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💸</text></svg>">
  <title>Millió - Milliárd</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      color: #333;
    }

    #control-panel {
      background-color: #ffffff;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 28px;
      text-align: center;
    }

    .highlight {
      color: #2c3e50;
    }

    .controls-grid {
      display: grid;
      /* Changed to 3 columns for the new slider */
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    #viz-container {
      flex-grow: 1;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      /* Default font size, overridden by JS */
      font-size: 1.2rem;
      line-height: 1.5;
      letter-spacing: 2px;
      word-wrap: break-word;
      /* Smooth transition when zooming */
      transition: font-size 0.1s ease-out;
    }

    /* Responsive design for smaller screens */
    @media (max-width: 900px) {
      .controls-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <div id="control-panel">
    <h1>Vehetnél <span id="house-count" class="highlight">20</span> házat 🏠</h1>

    <div class="controls-grid">
      <div class="slider-group">
        <div class="slider-header">
          <span>Milliárdok:</span>
          <span id="budget-display">1 Milliárd HUF</span>
        </div>
        <input type="range" id="budget-slider" min="1" max="2000" step="1" value="1">
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <span>Ház ára:</span>
          <span id="price-display">50 Millió HUF</span>
        </div>
        <input type="range" id="price-slider" min="10" max="200" step="1" value="50">
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <span>Zoom:</span>
          <span id="zoom-display">1.2x</span>
        </div>
        <input type="range" id="zoom-slider" min="0.1" max="5" step="0.1" value="1.2">
      </div>
    </div>
  </div>

  <div id="viz-container"></div>

  <script>
    const formatter = new Intl.NumberFormat('hu-HU');

    // DOM Elements
    const budgetSlider = document.getElementById('budget-slider');
    const priceSlider = document.getElementById('price-slider');
    const zoomSlider = document.getElementById('zoom-slider');

    const budgetDisplay = document.getElementById('budget-display');
    const priceDisplay = document.getElementById('price-display');
    const zoomDisplay = document.getElementById('zoom-display');
    const countDisplay = document.getElementById('house-count');

    const vizContainer = document.getElementById('viz-container');

    // Function to update the data and text content
    function updateVisualization() {
      const budgetInBillions = parseInt(budgetSlider.value);
      const priceInMillions = parseInt(priceSlider.value);

      const actualBudget = budgetInBillions * 1000000000;
      const actualHousePrice = priceInMillions * 1000000;

      const numHouses = Math.floor(actualBudget / actualHousePrice);

      budgetDisplay.textContent = `${formatter.format(budgetInBillions)} Milliárd HUF`;
      priceDisplay.textContent = `${formatter.format(priceInMillions)} Millió HUF`;
      countDisplay.textContent = formatter.format(numHouses);

      // Render emojis
      vizContainer.textContent = '🏠'.repeat(numHouses);
    }

    // Dedicated function to handle zooming independently for better performance
    function updateZoom() {
      const zoomLevel = zoomSlider.value;
      zoomDisplay.textContent = `${zoomLevel}x`;
      vizContainer.style.fontSize = `${zoomLevel}rem`;
    }

    // Event Listeners
    budgetSlider.addEventListener('input', updateVisualization);
    priceSlider.addEventListener('input', updateVisualization);
    zoomSlider.addEventListener('input', updateZoom);

    // Initial render
    updateVisualization();
    updateZoom();
  </script>
</body>

</html>
