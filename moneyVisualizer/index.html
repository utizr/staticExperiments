<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUF Buying Power Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      color: #333;
    }

    #control-panel {
      background-color: #ffffff;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 28px;
      text-align: center;
    }

    .highlight {
      color: #2c3e50;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    #viz-container {
      flex-grow: 1;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    svg:active {
      cursor: grabbing;
    }

    .house {
      font-size: 32px;
      user-select: none;
      alignment-baseline: middle;
      text-anchor: middle;
    }

    /* Responsive design for smaller screens */
    @media (max-width: 768px) {
      .controls-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <div id="control-panel">
    <h1>You can buy <span id="house-count" class="highlight">20</span> houses 🏠</h1>

    <div class="controls-grid">
      <div class="slider-group">
        <div class="slider-header">
          <span>Total Budget:</span>
          <span id="budget-display">1 Billion HUF</span>
        </div>
        <input type="range" id="budget-slider" min="1" max="1000" step="1" value="1">
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <span>House Price:</span>
          <span id="price-display">50 Million HUF</span>
        </div>
        <input type="range" id="price-slider" min="10" max="200" step="5" value="50">
      </div>
    </div>
  </div>

  <div id="viz-container">
    <svg id="canvas"></svg>
  </div>

  <script>
    // Formatter for numbers
    const formatter = new Intl.NumberFormat('hu-HU');

    // Initial State (Simplified values)
    let budgetInBillions = 1;
    let priceInMillions = 50;

    // DOM Elements
    const budgetSlider = document.getElementById('budget-slider');
    const priceSlider = document.getElementById('price-slider');
    const budgetDisplay = document.getElementById('budget-display');
    const priceDisplay = document.getElementById('price-display');
    const countDisplay = document.getElementById('house-count');

    // D3 Setup
    const svg = d3.select("#canvas");
    const g = svg.append("g");

    // Add Zoom and Pan behavior
    const zoom = d3.zoom()
      .scaleExtent([0.1, 5]) // Expanded zoom out scale for huge numbers
      .on("zoom", (event) => {
        g.attr("transform", event.transform);
      });

    svg.call(zoom);

    // Layout constants
    const spacing = 45;

    function updateVisualization() {
      // Re-calculate the actual math behind the scenes
      const actualBudget = budgetInBillions * 1000000000;
      const actualHousePrice = priceInMillions * 1000000;

      // Calculate number of houses
      const numHouses = Math.floor(actualBudget / actualHousePrice);

      // Update Text Displays
      budgetDisplay.textContent = `${formatter.format(budgetInBillions)} Billion HUF`;
      priceDisplay.textContent = `${formatter.format(priceInMillions)} Million HUF`;
      countDisplay.textContent = formatter.format(numHouses);

      // Generate an array of data for D3
      const data = Array.from({ length: numHouses }, (_, i) => i);

      // Calculate grid dimensions 
      const cols = Math.max(5, Math.ceil(Math.sqrt(numHouses * 1.5)));
      const rows = Math.ceil(numHouses / cols);

      // Get current SVG dimensions to center the initial layout
      const svgWidth = document.getElementById('viz-container').clientWidth;
      const svgHeight = document.getElementById('viz-container').clientHeight;

      const gridWidth = cols * spacing;
      const gridHeight = rows * spacing;

      const startX = (svgWidth - gridWidth) / 2 + (spacing / 2);
      const startY = (svgHeight - gridHeight) / 2 + (spacing / 2);

      // D3 Data Binding
      const houses = g.selectAll(".house")
        .data(data, d => d);

      // EXIT phase
      houses.exit()
        .remove(); // Removed transition for performance with large numbers

      // ENTER phase
      const enterHouses = houses.enter()
        .append("text")
        .attr("class", "house")
        .text("🏠")
        .attr("x", d => startX + (d % cols) * spacing)
        .attr("y", d => startY + Math.floor(d / cols) * spacing);

      // UPDATE + ENTER phase (merge)
      enterHouses.merge(houses)
        .attr("x", d => startX + (d % cols) * spacing)
        .attr("y", d => startY + Math.floor(d / cols) * spacing);
    }

    // Event Listeners for Sliders
    budgetSlider.addEventListener('input', (e) => {
      budgetInBillions = parseInt(e.target.value);
      updateVisualization();
    });

    priceSlider.addEventListener('input', (e) => {
      priceInMillions = parseInt(e.target.value);
      updateVisualization();
    });

    // Handle window resize to keep things centered
    window.addEventListener('resize', updateVisualization);

    // Initial render
    updateVisualization();
  </script>
</body>

</html>
