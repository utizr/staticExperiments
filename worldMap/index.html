<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoomable Interactive World Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background-color: #08070f;
      margin: 0;
      padding: 0;
      /* Force body to take exactly the window size */
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* Prevents scrollbars */
    }

    #map-container {
      /* Make container fill the entire body */
      width: 100%;
      height: 100%;
      position: relative;
    }

    .ocean {
      fill: #08070f;
      stroke: #110f1f;
      stroke-width: 3px;
      vector-effect: non-scaling-stroke;
    }

    .country {
      fill: #1d2434;
      /* Land color */
      stroke: #444b5b;
      stroke-width: 1px;
      vector-effect: non-scaling-stroke;
      transition: fill 0.2s;
      cursor: pointer;
    }

    .country:hover {
      fill: #92631d;
      /* Highlight on hover */
    }

    .country.selected {
      fill: #ff9800;
    }

    /* Styling for our city city dots */
    .city {
      fill: #3a4255;
      /* Bright yellow */
      stroke: #000;
      /* Dark border to make them pop */
      stroke-width: 0.5px;
      vector-effect: non-scaling-stroke;
      cursor: pointer;
      transition: fill 0.2s;
    }

    .city:hover {
      fill: #ffffff;
    }

    .city.selected {
      fill: #ff9800;
    }

    /* Tooltip styling */
    .tooltip {
      position: absolute;
      width: 100%;
      text-align: center;
      padding: 8px 12px;
      font-size: 18px;
      font-weight: bold;
      background: #1d2434;
      color: #d9dbe1;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    /* Styling for the flight path */
    .flight-path {
      fill: none;
      stroke: #ff3d00;
      /* Bright orange/red */
      stroke-width: 2px;
      stroke-dasharray: 4 4;
      /* Makes the line dashed */
      vector-effect: non-scaling-stroke;
      /* Keeps the line crisp when zooming */
      pointer-events: none;
      /* So it doesn't interfere with country clicks */
    }
  </style>
</head>

<body>

  <div id="map-container">
    <div class="tooltip" id="tooltip"></div>
  </div>

  <script>
    // Set dimensions for the SVG container
    const width = 1200;
    const height = 800;

    // Create the SVG element
    const svg = d3.select("#map-container")
      .append("svg")
      // NEW: viewBox defines the internal coordinate system
      .attr("viewBox", `0 0 ${width} ${height}`)
      // NEW: Tell the SVG to stretch visually to fit the container
      .style("width", "100%")
      .style("height", "100%");

    // Create a group for the map (required for semantic zooming)
    const g = svg.append("g");

    // Define the map projection (Natural Earth is visually pleasing for world maps)
    const projection = d3.geoNaturalEarth1()
      .scale(460)
      .translate([width / 2, height / 2]);

    // Define the path generator
    const path = d3.geoPath().projection(projection);

    // Select the tooltip
    const tooltip = d3.select("#tooltip");

    function getCityCircleSize(zoomScale) {
      let r = 4 / zoomScale
      r = Math.min(r, 3.9);
      r = Math.max(r, 1.8);
      return r;
    }
    // Set up the Zoom behavior
    const zoom = d3.zoom()
      .scaleExtent([0.1, 148]) // Zoom limits: 1x to 8x
      .on("zoom", (event) => {
        g.attr("transform", event.transform);
        // NEW: Dynamically shrink the city dots based on zoom level
        // The number '2' is the base size. Divide it by the zoom scale (k)

        g.selectAll(".city")
          .attr("r", getCityCircleSize(event.transform.k));
      });

    // Apply the zoom behavior to the SVG
    svg.call(zoom);
    // Add a white sphere with a black border.

    // Optional: Hide tooltip when clicking on the background (ocean)
    svg.on("click", (event) => {
      if (event.target.tagName !== "path") {
        tooltip.style("opacity", 0);
      }
    });

    // Track the first clicked point
    let firstPoint = null;
    // Draw the background sphere (ocean and outline)
    g.append("path")
      .datum({ type: "Sphere" })
      .attr("class", "ocean")
      .attr("d", path);
    // Fetch the GeoJSON data for the world
    // src: https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson
    // const geojsonUrl = "./world.geojson";
    // const geojsonUrl = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson";
    const geojsonUrl = "./worldProcessed.geojson";
    // const citiesUrl = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_populated_places_simple.geojson";
    const citiesUrl = "./50m_populated_places_simple.geojson";
    // const citiesUrl = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_populated_places_simple.geojson";
    // const citiesUrl = "./10m_populated_places_simple.geojson";


    Promise.all([
      d3.json(geojsonUrl),
      d3.json(citiesUrl)
    ]).then(([countryData, cityData]) => {
      // Draw the countries
      g.selectAll(".country")
        .data(countryData.features)
        .join("path")
        .attr("d", path)
        .attr("class", "country")
        // Handle the click event to show the popup
        .on("click", function (event, d) {
          event.stopPropagation();

          // 1. Check if the clicked country currently has the "selected" class
          const isAlreadySelected = d3.select(this).classed("selected");

          // 2. Clear the "selected" class from ALL countries
          d3.selectAll(".country").classed("selected", false);

          // 3. Reset your flight paths and cities
          g.selectAll(".flight-path").remove();
          d3.selectAll(".city").classed("selected", false);
          firstPoint = null;

          // 4. If it was NOT already selected, select it and show the tooltip
          if (!isAlreadySelected) {
            // Add the class back to just this country
            d3.select(this).classed("selected", true);

            const countryName = d.properties.NAME || d.properties.ADMIN || d.properties.name;

            tooltip.style("opacity", 1)
              .html(countryName);
          } else {
            // If it WAS already selected, we leave it unselected and hide the tooltip
            tooltip.style("opacity", 0);
          }
        })
        // Optional: Hide tooltip when the mouse leaves the country (if preferred over clicking elsewhere)
        .on("mouseleave", function () {
          // tooltip.style("opacity", 0);
        });

      // Draw the city cities on top
      // Grab the current zoom level of the map
      const currentZoom = d3.zoomTransform(svg.node()).k;
      // 2. Draw the city cities on top
      g.selectAll(".city")
        .data(cityData.features)
        .join("circle")
        .attr("class", "city")
        // Use projection to find exact x and y pixels
        .attr("cx", d => projection(d.geometry.coordinates)[0])
        .attr("cy", d => projection(d.geometry.coordinates)[1])
        .attr("r", getCityCircleSize(currentZoom))
        .on("click", function (event, d) {
          event.stopPropagation();

          const cityName = d.properties.city || d.properties.city || "Unknown city";
          const countryName = d.properties.country || "";

          // Logic for connecting two countries
          if (!firstPoint) {
            // --- FIRST CLICK ---
            firstPoint = d.geometry.coordinates;

            // Clear old lines and selections
            g.selectAll(".flight-path").remove();
            d3.selectAll(".city").classed("selected", false);

            // Highlight just this country
            d3.select(this).classed("selected", true);

          } else {
            // --- SECOND CLICK ---
            // Highlight the second country too
            d3.select(this).classed("selected", true);

            // Create a GeoJSON line from point A to point B
            const route = {
              type: "LineString",
              coordinates: [firstPoint, d.geometry.coordinates]
            };

            // 1. Draw the line and save it to a variable
            const flightPath = g.append("path")
              .datum(route)
              .attr("class", "flight-path")
              .attr("d", path);


            // --- Calculate the distance ---
            const earthRadiusKm = 6371; // Average radius of Earth in km
            const distanceInRadians = d3.geoDistance(firstPoint, d.geometry.coordinates);
            const distanceInKm = Math.round(distanceInRadians * earthRadiusKm);

            // Display the distance in the tooltip
            tooltip.style("opacity", 1)
              .html(`Distance:<br><span style="font-size:18px; font-weight:bold;">${distanceInKm} km</span>`);

            // --- Emoji Animation Logic ---

            // 2. Get the raw SVG node of the path so we can measure it
            const pathNode = flightPath.node();
            const pathLength = pathNode.getTotalLength();

            // 3. Add our emoji to the map group
            const plane = g.append("text")
              .text("✈️")
              // Adjust size based on your current zoom level so it's not massive
              .attr("font-size", `${15 / currentZoom}px`)
              .attr("text-anchor", "middle")
              .attr("dominant-baseline", "central")
              // Start it hidden at 0,0 to prevent a flash before the animation starts
              .attr("transform", "translate(0,0)")
              .style("cursor", "pointer")     // Changed from pointer-events: none so we can click it!
              .style("user-select", "none");  // Prevents text highlighting if clicked rapidly


            const animationTime = (distanceInKm / 200) * 1000;

            // --- NEW: Pause and Play Logic ---
            let isPaused = false;
            let currentT = 0; // Track the global flight progress (0.0 to 1.0)

            // Wrap the animation in a function so we can restart it easily
            function animatePlane(startProgress) {
              // Calculate how much time is remaining based on where we paused
              const remainingTime = animationTime * (1 - startProgress);

              // 4. Animate it along the path!
              plane.transition()
                .duration(remainingTime)
                .ease(d3.easeLinear)
                .attrTween("transform", function () {
                  return function (t) {
                    // 't' is the progress of this specific transition (0 to 1).
                    // We map it to the global flight progress 'currentT'
                    currentT = startProgress + t * (1 - startProgress);

                    // If we are at the very end of the path, don't look ahead 
                    const nextT = currentT < 1 ? currentT + 0.01 : 1;

                    // Get current position (P1) and future position (P2)
                    const p1 = pathNode.getPointAtLength(currentT * pathLength);
                    const p2 = pathNode.getPointAtLength(nextT * pathLength);

                    // Calculate the differences
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;

                    // Calculate the angle in radians, then convert to degrees
                    let angle = Math.atan2(dy, dx) * (180 / Math.PI);

                    const emojiOffset = 45;
                    angle += emojiOffset;

                    // Apply both the translation and the rotation
                    return `translate(${p1.x}, ${p1.y}) rotate(${angle})`;
                  };
                })
                .on("end", function () {
                  // Only remove the plane if it actually finished the journey (t > 0.99)
                  // We don't want to remove it if the transition ended just because it was interrupted/paused.
                  if (currentT >= 0.99) {
                    d3.select(this).remove();
                  }
                });
            }

            // Start the flight from 0!
            animatePlane(0);

            // 5. Add the click listener to toggle pause/play
            plane.on("click", function (event) {
              event.stopPropagation(); // Don't trigger the city/country clicks underneath

              if (isPaused) {
                // Plane was paused, let's fly! Resume from where we left off.
                isPaused = false;
                animatePlane(currentT);
              } else {
                // Plane was flying, let's pause!
                isPaused = true;
                // .interrupt() completely stops the current active d3.transition.
                d3.select(this).interrupt();
              }
            });

            // Reset memory so the next click starts a brand new line
            firstPoint = d.geometry.coordinates;
          }
        })
        // .attr("r", 1) // Initial size of the dot
        .on("mouseover", function (event, d) {
          event.stopPropagation(); // Stop the country underneath from registering a click

          // The dataset properties hold the names
          const cityName = d.properties.name || "Unknown city";
          const countryName = d.properties.sov0name || "Unknown Country";

          // Show a formatted tooltip with City and Country
          tooltip.style("opacity", 1)
            .html(`<span style="font-size:18px; font-weight:bold;">${cityName}</span><br><span style="font-size:14px; font-weight:normal;">${countryName}</span>`)
        });
      // .on("mouseleave", () => tooltip.style("opacity", 0));
    }).catch(error => {
      console.error("Error loading the map data: ", error);
    });
  </script>
</body>

</html>
