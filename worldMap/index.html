<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoomable Interactive World Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background-color: #08070f;
      margin: 0;
      padding: 0;
      /* Force body to take exactly the window size */
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* Prevents scrollbars */
    }

    #map-container {
      /* Make container fill the entire body */
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Styling for our new UI Controls */
    #ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      display: flex;
      gap: 10px;
    }

    button {
      background-color: #ff9800;
      color: #08070f;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #ffc107;
    }

    button:disabled {
      background-color: #3a4255;
      color: #888;
      cursor: not-allowed;
    }

    .ocean {
      fill: #08070f;
      stroke: #110f1f;
      stroke-width: 3px;
      vector-effect: non-scaling-stroke;
    }

    .country {
      fill: #1d2434;
      /* Land color */
      stroke: #444b5b;
      stroke-width: 1px;
      vector-effect: non-scaling-stroke;
      transition: fill 0.2s;
      cursor: pointer;
    }

    .country:hover {
      fill: #92631d;
      /* Highlight on hover */
    }

    .country.selected {
      fill: #ff9800;
    }

    /* Styling for our city dots */
    .city {
      fill: #3a4255;
      stroke: #000;
      /* Dark border to make them pop */
      stroke-width: 0.5px;
      vector-effect: non-scaling-stroke;
      cursor: pointer;
      transition: fill 0.2s;
    }

    .city:hover {
      fill: #ffffff;
    }

    .city.selected {
      fill: #ff9800;
    }

    /* Tooltip styling */
    .tooltip {
      position: absolute;
      width: 100%;
      text-align: center;
      padding: 8px 12px;
      font-size: 18px;
      font-weight: bold;
      background: #1d2434;
      color: #d9dbe1;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    /* Styling for the flight path */
    .flight-path {
      fill: none;
      stroke: #ff3d00;
      /* Bright orange/red */
      stroke-width: 2px;
      stroke-dasharray: 4 4;
      /* Makes the line dashed */
      vector-effect: non-scaling-stroke;
      /* Keeps the line crisp when zooming */
      pointer-events: none;
      /* So it doesn't interfere with country clicks */
    }
  </style>
</head>

<body>

  <div id="map-container">
    <div id="ui-panel">
      <button id="btn-start" disabled>Start Flight</button>
      <button id="btn-clear">Clear Route</button>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <script>
    // Set dimensions for the SVG container
    const width = 1200;
    const height = 800;

    // Create the SVG element
    const svg = d3.select("#map-container")
      .append("svg")
      // NEW: viewBox defines the internal coordinate system
      .attr("viewBox", `0 0 ${width} ${height}`)
      // NEW: Tell the SVG to stretch visually to fit the container
      .style("width", "100%")
      .style("height", "100%");

    // Create a group for the map (required for semantic zooming)
    const g = svg.append("g");

    // Define the map projection (Natural Earth is visually pleasing for world maps)
    const projection = d3.geoNaturalEarth1()
      .scale(460)
      .translate([width / 2, height / 2]);

    // Define the path generator
    const path = d3.geoPath().projection(projection);

    // Select the tooltip
    const tooltip = d3.select("#tooltip");

    function getCityCircleSize(zoomScale) {
      let r = 4 / zoomScale
      r = Math.min(r, 3.9);
      r = Math.max(r, 1.8);
      return r;
    }

    // Set up the Zoom behavior
    const zoom = d3.zoom()
      .scaleExtent([0.1, 148]) // Zoom limits: 0.1x to 148x
      .on("zoom", (event) => {
        g.attr("transform", event.transform);
        // Dynamically shrink the city dots based on zoom level so they don't block the screen
        g.selectAll(".city")
          .attr("r", getCityCircleSize(event.transform.k));
      });

    // Apply the zoom behavior to the SVG
    svg.call(zoom);

    // Optional: Hide tooltip when clicking on the background (ocean)
    svg.on("click", (event) => {
      if (event.target.tagName !== "path") {
        tooltip.style("opacity", 0);
      }
    });

    // Draw the background sphere (ocean and outline)
    g.append("path")
      .datum({ type: "Sphere" })
      .attr("class", "ocean")
      .attr("d", path);

    // --- GAME STATE VARIABLES ---
    // Instead of just 'firstPoint', we now store an array of all clicked cities
    let routePoints = [];
    // Track the total physical distance of the multi-stop journey
    let totalDistanceKm = 0;
    // Prevent the user from adding new cities while the animation is actively running
    let isFlying = false;

    // Fetch the GeoJSON data for the world
    // src: https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson
    // const geojsonUrl = "./world.geojson";
    // const geojsonUrl = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson";
    const geojsonUrl = "./worldProcessed.geojson";
    // const citiesUrl = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_populated_places_simple.geojson";
    const citiesUrl = "./50m_populated_places_simple.geojson";
    // const citiesUrl = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_populated_places_simple.geojson";
    // const citiesUrl = "./10m_populated_places_simple.geojson";

    Promise.all([
      d3.json(geojsonUrl),
      d3.json(citiesUrl)
    ]).then(([countryData, cityData]) => {

      // Draw the countries
      g.selectAll(".country")
        .data(countryData.features)
        .join("path")
        .attr("d", path)
        .attr("class", "country")
        // Handle the click event to show the popup
        .on("click", function (event, d) {
          event.stopPropagation();
          // We no longer clear the flight path when clicking a country, 
          // to prevent accidentally erasing a complex route
          const countryName = d.properties.NAME || d.properties.ADMIN || d.properties.name;
          tooltip.style("opacity", 1).html(countryName);
        });

      // Grab the current zoom level of the map
      const currentZoom = d3.zoomTransform(svg.node()).k;

      // Draw the city dots on top
      g.selectAll(".city")
        .data(cityData.features)
        .join("circle")
        .attr("class", "city")
        // Use projection to find exact x and y pixels
        .attr("cx", d => projection(d.geometry.coordinates)[0])
        .attr("cy", d => projection(d.geometry.coordinates)[1])
        .attr("r", getCityCircleSize(currentZoom))
        .on("click", function (event, d) {
          event.stopPropagation();

          // Lock city selection if the plane is currently in motion
          if (isFlying) return;

          // 1. Save the new city's coordinates to our route array
          const coords = d.geometry.coordinates;
          routePoints.push(coords);

          // 2. Visually highlight the clicked city
          d3.select(this).classed("selected", true);

          // 3. Clear the old drawn path so we can draw the updated one
          g.selectAll(".flight-path").remove();

          // If we have at least two cities, we can draw a line and enable the start button
          if (routePoints.length > 1) {
            document.getElementById('btn-start').disabled = false;

            // Create a multi-segment GeoJSON line string
            const route = {
              type: "LineString",
              coordinates: routePoints
            };

            // Draw the continuous dashed line between all points
            g.append("path")
              .datum(route)
              .attr("class", "flight-path")
              .attr("d", path);

            // Calculate the total distance by summing up each individual segment
            const earthRadiusKm = 6371; // Average radius of Earth in km
            totalDistanceKm = 0;
            for (let i = 0; i < routePoints.length - 1; i++) {
              totalDistanceKm += Math.round(d3.geoDistance(routePoints[i], routePoints[i + 1]) * earthRadiusKm);
            }

            // Display the updated total distance in the tooltip
            tooltip.style("opacity", 1)
              .html(`Total Distance:<br><span style="font-size:18px; font-weight:bold;">${totalDistanceKm} km</span>`);
          }
        })
        .on("mouseover", function (event, d) {
          event.stopPropagation(); // Stop the country underneath from registering a click

          // The dataset properties hold the names
          const cityName = d.properties.name || "Unknown city";
          const countryName = d.properties.sov0name || "Unknown Country";

          // Show a formatted tooltip with City and Country
          tooltip.style("opacity", 1)
            .html(`<span style="font-size:18px; font-weight:bold;">${cityName}</span><br><span style="font-size:14px; font-weight:normal;">${countryName}</span>`);
        });

      // --- BUTTON CONTROLS LOGIC ---

      // Clear Button: Resets the entire map state
      document.getElementById('btn-clear').addEventListener('click', () => {
        routePoints = [];
        totalDistanceKm = 0;
        isFlying = false;
        g.selectAll(".flight-path").remove();
        g.selectAll(".plane-emoji").remove();
        d3.selectAll(".city").classed("selected", false);
        document.getElementById('btn-start').disabled = true;
        tooltip.style("opacity", 0);
      });

      // Start Flight Button: Triggers the animation along the drawn path
      document.getElementById('btn-start').addEventListener('click', () => {
        // Double-check we have a valid route and aren't already flying
        if (routePoints.length < 2 || isFlying) return;

        isFlying = true;
        document.getElementById('btn-start').disabled = true;

        // Get the raw SVG node of the multi-segment path to measure its total pixel length
        const flightPath = d3.select(".flight-path");
        const pathNode = flightPath.node();
        const pathLength = pathNode.getTotalLength();

        // Check zoom level at the exact moment of launch to size the plane correctly
        const launchZoom = d3.zoomTransform(svg.node()).k;

        // Add the emoji plane to the map group
        const plane = g.append("text")
          .attr("class", "plane-emoji")
          .text("✈️")
          .attr("font-size", `${15 / launchZoom}px`)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "central")
          .attr("transform", "translate(0,0)") // Start at 0,0 temporarily
          .style("cursor", "pointer")
          .style("user-select", "none");

        // Scale animation duration based on total route distance (so long flights don't drag on forever)
        const animationTime = (totalDistanceKm / 200) * 1000;

        // Variables for pause/play functionality
        let isPaused = false;
        let currentT = 0; // Tracks global progress from 0.0 (start) to 1.0 (end)

        function animatePlane(startProgress) {
          // Calculate remaining time if resuming from a pause
          const remainingTime = animationTime * (1 - startProgress);

          plane.transition()
            .duration(remainingTime)
            .ease(d3.easeLinear)
            .attrTween("transform", function () {
              return function (t) {
                // 't' is the transition's local progress. Map it to the global progress
                currentT = startProgress + t * (1 - startProgress);

                // --- THE SHARP TURN FIX ---
                // Instead of looking ahead 1% (which smooths corners), we look exactly 1 pixel ahead.
                // This ensures the plane follows the line perfectly until the exact moment it hits the city.
                const lookAhead = 1 / pathLength;
                const nextT = currentT + lookAhead < 1 ? currentT + lookAhead : 1;

                // Get exact pixel coordinates for current and future positions along the path
                const p1 = pathNode.getPointAtLength(currentT * pathLength);
                const p2 = pathNode.getPointAtLength(nextT * pathLength);

                // Calculate the difference to find the angle
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;

                // Convert to degrees and add 45 degrees to offset the default emoji angle
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                angle += 45;

                // Apply translation and rotation frame-by-frame
                return `translate(${p1.x}, ${p1.y}) rotate(${angle})`;
              };
            })
            .on("end", function () {
              // Only remove the plane if it actually finished the whole journey
              if (currentT >= 0.99) {
                d3.select(this).remove();
                isFlying = false;
                // Re-enable the start button so they can fly the same route again if they want
                document.getElementById('btn-start').disabled = false;
              }
            });
        }

        // Kick off the animation from 0% progress
        animatePlane(0);

        // Allow clicking the plane to pause/resume
        plane.on("click", function (event) {
          event.stopPropagation();
          if (isPaused) {
            isPaused = false;
            animatePlane(currentT); // Resume from where we stopped
          } else {
            isPaused = true;
            d3.select(this).interrupt(); // Completely stop the active D3 transition
          }
        });
      });

    }).catch(error => {
      console.error("Error loading the map data: ", error);
    });
  </script>
</body>

</html>
