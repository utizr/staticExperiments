<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=overlays-content">
  <title>Text Editor</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #1f1b1a;
      /* Deep warm espresso */
      color: #e8e4e1;
      /* Warm off-white */
      display: flex;
      justify-content: center;
      margin: 1px 2px 200px;
      height: 100vh;
      box-sizing: border-box;
      color-scheme: dark;
    }

    .app-layout {
      display: flex;
      width: 100%;
      max-width: 900px;
      height: 100%;
    }

    /* --- Organizer Sidebar Styles --- */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 15, 13, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .sidebar {
      width: 90%;
      max-width: 400px;
      height: 80vh;
      max-height: 600px;
      background: #2a2422;
      border: 1px solid #4a403d;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 15px;
      background: #362f2d;
      border-bottom: 1px solid #4a403d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 {
      margin: 0;
      font-size: 16px;
      color: #f5f1ee;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .sidebar-header button,
    .folder-title button {
      padding: 4px 8px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      background: #2a2422;
      border: 1px solid #4a403d;
      border-radius: 4px;
      color: #e8e4e1;
      transition: background 0.2s;
    }

    .sidebar-header button:hover,
    .folder-title button:hover {
      background: #4a403d;
    }

    .folder-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
    }

    .folder-item {
      margin-bottom: 15px;
      border-radius: 6px;
      transition: margin 0.2s;
    }

    .folder-title {
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      color: #a69e9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px;
    }

    .folder-name-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: text;
      padding: 4px 6px;
      margin: 0 4px;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .folder-name-text:hover {
      background: #362f2d;
      color: #ffffff;
    }

    .folder-name-text[contenteditable="true"] {
      background: #1f1b1a;
      color: #ffffff;
      box-shadow: inset 0 0 0 2px #c2410c;
      outline: none;
      cursor: text;
    }

    .note-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .note-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      font-size: 14px;
      color: #d6d2d0;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .note-name-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-item:hover {
      background: #362f2d;
    }

    .note-item.active {
      background: #65710a;
      color: #ffedd5;
      font-weight: 600;
    }

    /* Rich terracotta active state */
    .drag-handle {
      cursor: grab;
      padding: 0 8px 0 0;
      color: #7a706c;
      touch-action: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .drag-handle:hover {
      color: #e8e4e1;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .drop-target-before {
      box-shadow: inset 0 2px 0 0 #ea580c;
    }

    .drop-target-after {
      box-shadow: inset 0 -2px 0 0 #ea580c;
    }

    .drop-target-inside {
      background-color: #4a1f0f !important;
      border-radius: 6px;
    }

    /* --- Editor Styles --- */
    /* --- Editor Link Styles --- */
    .editor-area a {
      color: #afc220;
      /* Warm bright orange */
      text-decoration: underline;
      text-decoration-color: #afc220;
      /* Muted underline */
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: color 0.2s, text-decoration-color 0.2s;
    }

    .editor-area a:hover {
      color: #d0e721;
      /* Lighter peach/orange on hover */
      text-decoration-color: #d0e721;
    }

    .editor-container {
      flex: 1;
      background: #2a2422;
      border: 1px solid #4a403d;
      border-radius: 8px;
      box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      overflow: clip;
      position: relative;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #362f2d;
      padding: 10px;
      border-bottom: 1px solid #4a403d;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left {
      display: flex;
      gap: 8px;
      flex: 1;
      align-items: center;
    }

    .toolbar input[type="text"] {
      flex: 1;
      padding: 6px 12px;
      font-size: 16px;
      font-weight: bold;
      color: #e8e4e1;
      border: 1px solid transparent;
      border-radius: 4px;
      outline: none;
      background: transparent;
      transition: border-color 0.2s, background 0.2s;
    }

    .toolbar input[type="text"]:focus {
      border-color: #c2410c;
      /* Burnt orange focus */
      background: #1f1b1a;
    }

    .toolbar input[type="text"]:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .toolbar button {
      padding: 6px 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: #2a2422;
      border: 1px solid #4a403d;
      color: #e8e4e1;
      border-radius: 4px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar button:hover {
      background: #4a403d;
    }

    #btn-menu {
      font-size: 16px;
      padding: 6px 10px;
    }

    .editor-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      outline: none;
      line-height: 1.6;
    }

    .editor-area p {
      margin-top: 0;
      margin-bottom: 1em;
    }

    .editor-area ul {
      margin-top: 0;
      padding-left: 20px;
    }

    .editor-area code {
      background-color: #1f1b1a;
      color: #fdba74;
      border-radius: 5px;
      padding: 1px 5px;
      font-family: 'SF Mono', monospace;
      font-size: 13px;
      border: 1px solid #3d3330;
    }

    .editor-area pre {
      background-color: #1f1b1a;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 0.5em 0 1em;
      border: 1px solid #4a403d;
    }

    .editor-area pre code {
      background-color: transparent;
      padding: 0;
      font-size: 13px;
      white-space: pre;
      border: none;
      color: #e8e4e1;
    }

    /* --- Format Modal Styles --- */
    .format-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 15, 13, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .format-modal {
      background: #2a2422;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      min-width: 260px;
      border: 1px solid #4a403d;
    }

    .format-modal label {
      display: block;
      font-size: 13px;
      color: #a69e9a;
      margin-bottom: 8px;
    }

    .format-modal input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      font-size: 16px;
      background: #1f1b1a;
      color: #e8e4e1;
      border: 1px solid #4a403d;
      border-radius: 6px;
      outline: none;
    }

    .format-modal input:focus {
      border-color: #ea580c;
      box-shadow: 0 0 0 2px rgba(234, 88, 12, 0.25);
    }

    .format-modal input+input {
      margin-top: 8px;
    }

    .format-modal .btn-cancel {
      margin-top: 12px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      background: #362f2d;
      border: 1px solid #4a403d;
      border-radius: 6px;
      color: #a69e9a;
      transition: background 0.15s, color 0.15s;
    }

    .format-modal .btn-cancel:hover {
      background: #4a403d;
      color: #f5f1ee;
    }
  </style>
</head>

<body>

  <div class="app-layout">
    <div class="editor-container">
      <div class="toolbar">
        <div class="toolbar-left">
          <button id="btn-menu" title="Open Folders">☰</button>
          <input type="text" id="note-title-input" placeholder="Note Title..." disabled>
        </div>
        <div>
          <button id="btn-mode">📝</button>
          <button id="btn-format">🪄</button>
        </div>
      </div>

      <div id="myEditor" class="editor-area" contenteditable="true">
      </div>
    </div>
  </div>

  <script src="lib/editor.js"></script>
  <script src="lib/organizer.js"></script>
  <script>
    // --- App State & Bootstrapping ---
    const STORAGE_KEY = 'textEditor_app_data';
    let appData = { folders: [], notes: [] };
    let currentNoteId = null;

    const generateId = () => Math.random().toString(36).substring(2, 9);
    const saveData = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));

    // Initial Load
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      appData = JSON.parse(saved);
    } else {
      const defaultFolderId = generateId();
      const defaultNoteId = generateId();
      appData.folders.push({ id: defaultFolderId, name: 'General Notes' });
      appData.notes.push({ id: defaultNoteId, folderId: defaultFolderId, title: 'Welcome to your hybrid rich text editor', content: null });
      saveData();
    }

    if (appData.notes.length > 0) currentNoteId = appData.notes[0].id;

    // --- DOM Elements ---
    const editorEl = document.getElementById('myEditor');
    const titleInput = document.getElementById('note-title-input');
    const btnMenu = document.getElementById('btn-menu');

    // --- Mount Libraries ---
    const editorInstance = SimpleEditor.mount(editorEl);
    const organizer = new SidebarOrganizer(appData);

    // --- Controller Logic ---
    function loadNoteIntoEditor(noteId) {
      currentNoteId = noteId;
      const note = appData.notes.find(n => n.id === noteId);

      if (note) {
        titleInput.value = note.title;
        titleInput.disabled = false;
        editorEl.innerHTML = note.content ? SimpleEditor.jsonToHtmlString(note.content) : '<p><br></p>';
        organizer.setActiveNote(noteId);
      }
    }

    // React to Organizer Events
    organizer.on('change', (newData) => {
      appData = newData; // Sync local state
      saveData();        // Persist to storage
    });

    organizer.on('select', (noteId) => {
      loadNoteIntoEditor(noteId);
    });

    // React to Host Header Events
    btnMenu.addEventListener('click', () => organizer.open());

    titleInput.addEventListener('change', (e) => {
      if (currentNoteId) {
        const note = appData.notes.find(n => n.id === currentNoteId);
        if (note) {
          note.title = e.target.value || 'Untitled Note';
          saveData();
          organizer.updateData(appData); // Sync back to organizer UI
        }
      }
    });

    // React to Editor Content Events
    let saveTimer = null;
    editorInstance.on('change', (html) => {
      if (!currentNoteId) return;
      if (saveTimer) clearTimeout(saveTimer);

      saveTimer = setTimeout(() => {
        const note = appData.notes.find(n => n.id === currentNoteId);
        if (note) {
          note.content = SimpleEditor.htmlStringToJson(html);
          saveData();
        }
      }, 1000);
    });

    // Editor Toolbar Overrides
    const btnMode = document.getElementById('btn-mode');
    const btnFormat = document.getElementById('btn-format');

    const updateModeButton = () => btnMode.textContent = editorInstance.mode === 'edit' ? '📖' : '📝';
    updateModeButton();

    editorInstance.on('modechange', updateModeButton);
    btnMode.addEventListener('click', () => editorInstance.toggleMode());
    btnFormat.addEventListener('mousedown', (e) => e.preventDefault());
    btnFormat.addEventListener('click', () => editorInstance.openFormatModal());

    // Final Init
    if (currentNoteId) loadNoteIntoEditor(currentNoteId);
  </script>

</body>

</html>
