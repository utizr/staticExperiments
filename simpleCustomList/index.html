<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draggable Extensible Blocks - Smooth Animation</title>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
    }

    .container {
      background-color: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      min-width: 450px;
    }

    .text-block-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .text-block {
      background-color: #f8f9fa;
      padding: 16px 16px 16px 40px;
      border-radius: 6px;
      border: 1px solid transparent;
      position: relative;
      /* CHANGED: Specifically target background instead of 'all' */
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .text-block:hover {
      background-color: #e9ecef;
    }

    .block-handle {
      position: absolute;
      left: 8px;
      top: 18px;
      color: #adb5bd;
      padding: 4px;
      border-radius: 4px;
      cursor: grab;
      user-select: none;
      transition: background-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .block-handle:hover {
      color: #495057;
      background-color: #dee2e6;
    }

    .block-handle:active {
      cursor: grabbing;
    }

    .text-block p,
    .text-block i,
    .text-block a,
    .text-block .url-edit-field {
      display: block;
      color: #333;
      padding: 6px;
      margin: 0;
      border: 1px dashed transparent;
      border-radius: 4px;
      /* CHANGED: Same here, avoid 'all' to prevent interference */
      transition: background-color 0.2s ease, border-color 0.2s ease;
      min-width: 250px;
    }

    .text-block p {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .text-block i {
      font-size: 14px;
      color: #666;
      margin-bottom: 4px;
    }

    .text-block a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }

    .text-block a:hover {
      text-decoration: underline;
    }

    .text-block a[contenteditable="true"] {
      text-decoration: none;
    }

    .text-block .url-edit-field {
      display: none;
      font-family: monospace;
      font-size: 13px;
      color: #d63384;
      background-color: #fcf8fa;
      margin-bottom: 4px;
    }

    .text-block .url-edit-field.visible {
      display: block;
    }

    .text-block [contenteditable="true"] {
      border-color: #007bff;
      background-color: #fff;
      outline: none;
      cursor: text;
    }

    .sortable-ghost {
      opacity: 0.4;
      background-color: #e2e6ea;
      border: 1px dashed #adb5bd;
    }

    /* Optional: Add a class for the item actively being dragged */
    .sortable-drag {
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      cursor: grabbing !important;
    }

    .add-btn {
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 24px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      align-self: center;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .add-btn:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }

    .add-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <div class="container" id="app-container"></div>

  <script>
    const blocksData = [
      {
        type: "simple-list",
        elements: [
          { element: "p", text: "Search Engine" },
          { element: "i", text: "Find anything on the web" },
          { element: "a", text: "Go to Google", href: "https://google.com" }
        ]
      },
      {
        type: "simple-list",
        elements: [
          { element: "p", text: "Developer Docs" },
          { element: "i", text: "Read the web documentation" },
          { element: "a", text: "Visit MDN", href: "https://developer.mozilla.org" }
        ]
      }
    ];

    const ElementRegistry = {
      'p': {
        create: (data) => {
          const el = document.createElement('p');
          el.textContent = data.text;
          el.dataset.placeholder = data.text;
          return [el];
        },
        startEdit: (elements) => elements[0].setAttribute('contenteditable', 'true'),
        endEdit: (elements) => {
          const el = elements[0];
          el.removeAttribute('contenteditable');
          if (el.textContent.trim() === '') el.textContent = el.dataset.placeholder;
        },
        getPlaceholder: () => ({ element: 'p', text: 'New Item Title' })
      },

      'i': {
        create: (data) => {
          const el = document.createElement('i');
          el.textContent = data.text;
          el.dataset.placeholder = data.text;
          return [el];
        },
        startEdit: (elements) => elements[0].setAttribute('contenteditable', 'true'),
        endEdit: (elements) => {
          const el = elements[0];
          el.removeAttribute('contenteditable');
          if (el.textContent.trim() === '') el.textContent = el.dataset.placeholder;
        },
        getPlaceholder: () => ({ element: 'i', text: 'Add a description here' })
      },

      'a': {
        create: (data) => {
          const a = document.createElement('a');
          a.href = data.href || 'https://';
          a.textContent = data.text;
          a.target = '_blank';
          a.dataset.placeholder = data.text;
          a.addEventListener('click', (e) => {
            if (a.getAttribute('contenteditable') === 'true') e.preventDefault();
          });

          const urlField = document.createElement('div');
          urlField.className = 'url-edit-field';
          urlField.textContent = a.href;
          urlField.dataset.placeholder = data.href || 'https://';

          return [a, urlField];
        },
        startEdit: (elements) => {
          const [a, urlField] = elements;
          a.setAttribute('contenteditable', 'true');
          urlField.classList.add('visible');
          urlField.setAttribute('contenteditable', 'true');
        },
        endEdit: (elements) => {
          const [a, urlField] = elements;
          a.removeAttribute('contenteditable');
          urlField.removeAttribute('contenteditable');

          let newUrl = urlField.textContent.trim();
          if (newUrl === '') newUrl = urlField.dataset.placeholder;
          a.href = newUrl;
          urlField.textContent = newUrl;
          urlField.classList.remove('visible');

          if (a.textContent.trim() === '') a.textContent = a.dataset.placeholder;
        },
        getPlaceholder: () => ({ element: 'a', text: 'Link text', href: 'https://example.com' })
      }
    };

    const appContainer = document.getElementById('app-container');
    const textBlockContainer = document.createElement('div');
    textBlockContainer.className = 'text-block-container';
    appContainer.appendChild(textBlockContainer);

    let isDraggingBlock = false;

    function selectAllText(element) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(element);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function applyEditableLogic(textBlock, componentInstances, handle) {

      handle.addEventListener('click', function (e) {
        if (isDraggingBlock) return;

        componentInstances.forEach(comp => comp.startEdit());

        const editableElements = Array.from(textBlock.querySelectorAll('[contenteditable="true"]'));
        if (editableElements.length > 0) {
          editableElements[0].focus();
          selectAllText(editableElements[0]);
        }
      });

      textBlock.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();

          const editableElements = Array.from(textBlock.querySelectorAll('[contenteditable="true"]'));
          const currentIndex = editableElements.indexOf(e.target);

          if (currentIndex >= 0 && currentIndex < editableElements.length - 1) {
            const nextElement = editableElements[currentIndex + 1];
            nextElement.focus();
            selectAllText(nextElement);
          } else {
            e.target.blur();
          }
        }
      });

      textBlock.addEventListener('paste', function (e) {
        if (e.target.getAttribute('contenteditable') === 'true') {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text/plain');
          document.execCommand('insertText', false, text);
        }
      });

      textBlock.addEventListener('focusout', function (e) {
        if (!textBlock.contains(e.relatedTarget)) {
          componentInstances.forEach(comp => comp.endEdit());
        }
      });
    }

    function createBlockElement(elementsData) {
      const blockDiv = document.createElement('div');
      blockDiv.className = 'text-block';

      const handle = document.createElement('div');
      handle.className = 'block-handle';
      handle.innerHTML = `<svg width="14" height="18" viewBox="0 0 14 18" fill="currentColor"><path d="M4.5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>`;
      handle.title = 'Click to edit, drag to move';
      blockDiv.appendChild(handle);

      const componentInstances = [];

      elementsData.forEach(elementData => {
        const definition = ElementRegistry[elementData.element];

        if (definition) {
          const domNodes = definition.create(elementData);
          domNodes.forEach(node => blockDiv.appendChild(node));

          componentInstances.push({
            startEdit: () => definition.startEdit(domNodes),
            endEdit: () => definition.endEdit(domNodes)
          });
        }
      });

      applyEditableLogic(blockDiv, componentInstances, handle);
      return blockDiv;
    }

    blocksData.forEach(blockInfo => {
      textBlockContainer.appendChild(createBlockElement(blockInfo.elements));
    });

    // Initialize Sortable.js with enhanced animation
    new Sortable(textBlockContainer, {
      handle: '.block-handle',
      animation: 250, // CHANGED: Increased from 150 to 250 for smoother motion
      easing: "cubic-bezier(0.25, 1, 0.5, 1)", // CHANGED: Added a custom deceleration curve
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag', // Added drag styling class
      onStart: function () {
        isDraggingBlock = true;
      },
      onEnd: function () {
        setTimeout(() => {
          isDraggingBlock = false;
        }, 50);
      }
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+';
    textBlockContainer.appendChild(addBtn);

    addBtn.addEventListener('click', () => {
      const template = ['p', 'i', 'a'];
      const placeholderData = template.map(type => ElementRegistry[type].getPlaceholder());

      const newBlock = createBlockElement(placeholderData);
      textBlockContainer.insertBefore(newBlock, addBtn);

      newBlock.querySelector('.block-handle').click();
    });

  </script>
</body>

</html>
