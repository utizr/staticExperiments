<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick lists</title>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    /* Global box-sizing for proper responsive padding calculations */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
    }

    .container {
      background-color: white;
      padding: 1.5rem;
      /* 40px */
      border-radius: 0.5rem;
      /* 8px */
      box-shadow: 0 0.25rem 0.375rem rgba(0, 0, 0, 0.1);

      /* Responsive Width adjustments */
      width: 90%;
      max-width: 35rem;
    }

    .panel {
      display: flex;
      position: relative;
      flex-direction: column;
      gap: 1rem;
      padding: 0.1rem 0.1rem 0rem 1.5rem;
      border-left: 0.34rem solid #e9e9e9;
      /* 16px */
    }

    .text-block {
      background-color: #f8f9fa;
      /* Added left padding for the handle: 16px 16px 16px 40px -> 1rem 1rem 1rem 2.5rem */
      padding: 0.2rem 0.2rem 0.2rem 2.5rem;
      border-radius: 0.375rem;
      /* 6px */
      border: 1px solid transparent;
      position: relative;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .text-block:hover {
      background-color: #e9ecef;
    }

    .block-handle {
      position: absolute;
      left: 0.5rem;
      /* 8px */

      /* Vertical Centering Magic */
      top: 50%;
      transform: translateY(-50%);

      color: #adb5bd;
      padding: 0.25rem;
      /* 4px */
      border-radius: 0.25rem;
      /* 4px */
      cursor: grab;
      user-select: none;
      transition: background-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .block-handle:hover {
      color: #495057;
      background-color: #dee2e6;
    }

    .block-handle:active {
      cursor: grabbing;
    }

    .text-block p,
    .text-block i,
    .text-block a,
    .text-block .url-edit-field {
      display: block;
      color: #333;
      padding: 0.225rem;
      /* 6px */
      margin: 0;
      border: 1px dashed transparent;
      border-radius: 0.25rem;
      /* 4px */
      transition: background-color 0.2s ease, border-color 0.2s ease;
      width: 100%;
      /* Replaced min-width to ensure it fits mobile */
      word-wrap: break-word;
      /* Prevents long text from breaking layout */
    }

    .text-block p {
      font-size: 1.125rem;
      /* 18px */
      font-weight: 500;
      /* 4px */
    }

    .text-block i {
      font-size: 0.875rem;
      /* 14px */
      color: #666;
    }

    .text-block a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
    }

    .text-block a:hover {
      text-decoration: underline;
    }

    .text-block a[contenteditable="true"] {
      text-decoration: none;
    }

    .text-block .url-edit-field {
      display: none;
      font-family: monospace;
      font-size: 0.8125rem;
      /* 13px */
      color: #d63384;
      background-color: #fcf8fa;
      margin-bottom: 0.25rem;
    }

    .text-block .url-edit-field.visible {
      display: block;
    }

    .text-block [contenteditable="true"] {
      border-color: #007bff;
      background-color: #fff;
      outline: none;
      cursor: text;
    }

    .sortable-ghost {
      opacity: 0.4;
      background-color: #e2e6ea;
      border: 1px dashed #adb5bd;
    }

    .sortable-drag {
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
      /* 0 8px 16px */
      cursor: grabbing !important;
    }

    .add-btn {
      background-color: #dddddd;
      color: white;
      border: none;
      border-radius: 50%;
      width: 2.25rem;
      height: 2.25rem;
      font-size: 1.5rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin-left: -2.75rem;
      position: absolute;
      bottom: -0.7em;
    }

    .add-btn:hover {
      background-color: #e9e9e9;
      transform: scale(1.05);
    }

    .add-btn:active {
      transform: scale(0.95);
    }

    .delete-btn {
      display: none;
      width: 100%;
      padding: 0.4rem;
      margin-top: 0.25rem;
      border: none;
      border-radius: 0.25rem;
      background-color: #f8d7da;
      color: #842029;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .delete-btn.visible {
      display: block;
    }

    .delete-btn:hover {
      background-color: #f1aeb5;
    }

    .text-block.removing {
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .text-block.collapsing {
      overflow: hidden;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-width: 0;
      height: 0 !important;
      transition: height 0.45s ease, padding 0.45s ease, margin 0.45s ease;
      pointer-events: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.visible {
      opacity: 1;
    }

    .modal {
      background-color: white;
      border-radius: 0.5rem;
      padding: 1.25rem;
      width: 90%;
      max-width: 20rem;
      box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.2);
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .modal-overlay.visible .modal {
      transform: scale(1);
    }

    .modal textarea {
      width: 100%;
      min-height: 6rem;
      padding: 0.625rem;
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      font-family: monospace;
      font-size: 0.9375rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal textarea:focus {
      border-color: #007bff;
    }

    .modal-buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .modal-buttons button {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .modal-buttons button:active {
      transform: scale(0.96);
    }

    .modal-btn-add {
      background-color: #007bff;
      color: white;
    }

    .modal-btn-add:hover {
      background-color: #0056b3;
    }

    .modal-btn-prev {
      background-color: #e9ecef;
      color: #333;
    }

    .modal-btn-prev:hover {
      background-color: #dee2e6;
    }

    .modal-btn-cancel {
      background-color: #f8d7da;
      color: #842029;
    }

    .modal-btn-cancel:hover {
      background-color: #f1aeb5;
    }
  </style>
</head>

<body>

  <div class="container" id="app-container"></div>

  <script>
    const blocksData = [
      {
        type: "simple-list",
        elements: [
          { element: "p", text: "Search Engine" },
          { element: "i", text: "Find anything on the web" },
          { element: "a", text: "Go to Google", href: "https://google.com" }
        ]
      },
      {
        type: "simple-list",
        elements: [
          { element: "p", text: "Developer Docs" },
          { element: "i", text: "Read the web documentation" },
          { element: "a", text: "Visit MDN", href: "https://developer.mozilla.org" }
        ]
      }
    ];

    const ElementRegistry = {
      'p': {
        create: (data) => {
          const el = document.createElement('p');
          el.textContent = data.text;
          el.dataset.placeholder = data.text;
          return [el];
        },
        startEdit: (elements) => elements[0].setAttribute('contenteditable', 'true'),
        endEdit: (elements) => {
          const el = elements[0];
          el.removeAttribute('contenteditable');
          if (el.textContent.trim() === '') el.textContent = el.dataset.placeholder;
        },
        getPlaceholder: () => ({ element: 'p', text: 'New Item Title' })
      },

      'i': {
        create: (data) => {
          const el = document.createElement('i');
          el.textContent = data.text;
          el.dataset.placeholder = data.text;
          return [el];
        },
        startEdit: (elements) => elements[0].setAttribute('contenteditable', 'true'),
        endEdit: (elements) => {
          const el = elements[0];
          el.removeAttribute('contenteditable');
          if (el.textContent.trim() === '') el.textContent = el.dataset.placeholder;
        },
        getPlaceholder: () => ({ element: 'i', text: 'Add a description here' })
      },

      'a': {
        create: (data) => {
          const a = document.createElement('a');
          a.href = data.href || 'https://';
          a.textContent = data.text;
          a.target = '_blank';
          a.dataset.placeholder = data.text;
          a.addEventListener('click', (e) => {
            if (a.getAttribute('contenteditable') === 'true') e.preventDefault();
          });

          const urlField = document.createElement('div');
          urlField.className = 'url-edit-field';
          urlField.textContent = a.href;
          urlField.dataset.placeholder = data.href || 'https://';

          return [a, urlField];
        },
        startEdit: (elements) => {
          const [a, urlField] = elements;
          a.setAttribute('contenteditable', 'true');
          urlField.classList.add('visible');
          urlField.setAttribute('contenteditable', 'true');
        },
        endEdit: (elements) => {
          const [a, urlField] = elements;
          a.removeAttribute('contenteditable');
          urlField.removeAttribute('contenteditable');

          let newUrl = urlField.textContent.trim();
          if (newUrl === '') newUrl = urlField.dataset.placeholder;
          a.href = newUrl;
          urlField.textContent = newUrl;
          urlField.classList.remove('visible');

          if (a.textContent.trim() === '') a.textContent = a.dataset.placeholder;
        },
        getPlaceholder: () => ({ element: 'a', text: 'Link text', href: 'https://example.com' })
      }
    };

    const appContainer = document.getElementById('app-container');
    const panel = document.createElement('div');
    panel.className = 'panel';
    appContainer.appendChild(panel);

    let isDraggingBlock = false;

    function selectAllText(element) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(element);
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function applyEditableLogic(textBlock, componentInstances, handle, deleteBtn) {

      handle.addEventListener('click', function (e) {
        if (isDraggingBlock) return;

        componentInstances.forEach(comp => comp.startEdit());
        deleteBtn.classList.add('visible');

        const editableElements = Array.from(textBlock.querySelectorAll('[contenteditable="true"]'));
        if (editableElements.length > 0) {
          editableElements[0].focus();
          selectAllText(editableElements[0]);
        }
      });

      textBlock.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();

          const editableElements = Array.from(textBlock.querySelectorAll('[contenteditable="true"]'));
          const currentIndex = editableElements.indexOf(e.target);

          if (currentIndex >= 0 && currentIndex < editableElements.length - 1) {
            const nextElement = editableElements[currentIndex + 1];
            nextElement.focus();
            selectAllText(nextElement);
          } else {
            e.target.blur();
          }
        }
      });

      textBlock.addEventListener('paste', function (e) {
        if (e.target.getAttribute('contenteditable') === 'true') {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text/plain');
          document.execCommand('insertText', false, text);
        }
      });

      textBlock.addEventListener('focusout', function (e) {
        if (!textBlock.contains(e.relatedTarget)) {
          componentInstances.forEach(comp => comp.endEdit());
          deleteBtn.classList.remove('visible');
        }
      });
    }

    function createBlockElement(elementsData) {
      const blockDiv = document.createElement('div');
      blockDiv.className = 'text-block';

      const handle = document.createElement('div');
      handle.className = 'block-handle';
      handle.innerHTML = `<svg width="14" height="18" viewBox="0 0 14 18" fill="currentColor"><path d="M4.5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-5 5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>`;
      handle.title = 'Click to edit, drag to move';
      blockDiv.appendChild(handle);

      const componentInstances = [];

      elementsData.forEach(elementData => {
        const definition = ElementRegistry[elementData.element];

        if (definition) {
          const domNodes = definition.create(elementData);
          domNodes.forEach(node => blockDiv.appendChild(node));

          componentInstances.push({
            startEdit: () => definition.startEdit(domNodes),
            endEdit: () => definition.endEdit(domNodes)
          });
        }
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        blockDiv.style.height = blockDiv.offsetHeight + 'px';
        blockDiv.classList.add('removing');
        setTimeout(() => {
          blockDiv.classList.add('collapsing');
          blockDiv.addEventListener('transitionend', () => blockDiv.remove(), { once: true });
        }, 200);
      });
      blockDiv.appendChild(deleteBtn);

      applyEditableLogic(blockDiv, componentInstances, handle, deleteBtn);
      return blockDiv;
    }

    blocksData.forEach(blockInfo => {
      panel.appendChild(createBlockElement(blockInfo.elements));
    });

    // Initialize Sortable.js with Mobile optimizations
    new Sortable(panel, {
      handle: '.block-handle',
      animation: 250,
      easing: "cubic-bezier(0.25, 1, 0.5, 1)",
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',

      // Touch & Mobile Configuration
      delay: 150,                // Requires a 150ms hold before drag starts
      delayOnTouchOnly: true,    // The delay only applies to touch screens, mouse dragging remains instant
      touchStartThreshold: 5,    // The user's finger must move 5 pixels to cancel the "delay" (prevents accidental drags when clicking)

      onStart: function () {
        isDraggingBlock = true;
      },
      onEnd: function () {
        setTimeout(() => {
          isDraggingBlock = false;
        }, 50);
      }
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+';
    panel.appendChild(addBtn);

    let previousTemplate = null;

    function showAddModal() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';

      const modal = document.createElement('div');
      modal.className = 'modal';

      const textarea = document.createElement('textarea');
      textarea.placeholder = 'Enter element types, one per line:\na\np\ni';

      const btnRow = document.createElement('div');
      btnRow.className = 'modal-buttons';

      const addModalBtn = document.createElement('button');
      addModalBtn.className = 'modal-btn-add';
      addModalBtn.textContent = 'Add';

      const prevBtn = document.createElement('button');
      prevBtn.className = 'modal-btn-prev';
      prevBtn.textContent = 'Add previous';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'modal-btn-cancel';
      cancelBtn.textContent = 'Cancel';

      btnRow.appendChild(addModalBtn);
      btnRow.appendChild(prevBtn);
      btnRow.appendChild(cancelBtn);
      modal.appendChild(textarea);
      modal.appendChild(btnRow);
      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      requestAnimationFrame(() => overlay.classList.add('visible'));
      textarea.focus();

      function addBlockFromTemplate(types) {
        const validTypes = types.filter(t => ElementRegistry[t]);
        if (validTypes.length === 0) return;

        previousTemplate = validTypes;
        const placeholderData = validTypes.map(type => ElementRegistry[type].getPlaceholder());
        const newBlock = createBlockElement(placeholderData);
        panel.insertBefore(newBlock, addBtn);
        newBlock.querySelector('.block-handle').click();
      }

      function closeModal() {
        overlay.classList.remove('visible');
        overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
      }

      addModalBtn.addEventListener('click', () => {
        const types = textarea.value.split('\n').map(l => l.trim()).filter(Boolean);
        closeModal();
        addBlockFromTemplate(types);
      });

      prevBtn.addEventListener('click', () => {
        closeModal();
        if (previousTemplate) {
          addBlockFromTemplate(previousTemplate);
        }
      });

      cancelBtn.addEventListener('click', closeModal);

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
      });
    }

    addBtn.addEventListener('click', showAddModal);

  </script>
</body>

</html>
